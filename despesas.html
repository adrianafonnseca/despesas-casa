<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle de Despesas 💰</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #e0eaff 0%, #fce4f3 100%);
      padding: 2rem 1rem 4rem;
    }

    .container { width: 100%; max-width: 520px; margin: 0 auto; }

    .header { text-align: center; margin-bottom: 2rem; }
    .header .emoji { font-size: 3rem; display: block; margin-bottom: 0.5rem; }
    .header h1 {
      font-size: 1.9rem; font-weight: 800;
      background: linear-gradient(90deg, #3b82f6, #a855f7, #ec4899);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 0.3rem;
    }
    .header p { font-size: 0.95rem; color: #6b7280; }

    .card {
      background: #fff; border-radius: 24px; padding: 1.75rem;
      box-shadow: 0 8px 32px rgba(59,130,246,.10), 0 2px 8px rgba(236,72,153,.08);
      margin-bottom: 1.5rem;
    }

    .card-title {
      font-size: 1rem; font-weight: 800; color: #1f2937;
      margin-bottom: 1.25rem; display: flex; align-items: center; gap: 8px;
    }

    /* Tabs de tipo */
    .tabs { display: flex; gap: 8px; margin-bottom: 1.25rem; }
    .tab {
      flex: 1; padding: 0.6rem 0.4rem; border: 2px solid #e5e7eb;
      border-radius: 12px; font-family: 'Nunito', sans-serif;
      font-size: 0.8rem; font-weight: 700; cursor: pointer;
      background: #f9fafb; color: #6b7280; text-align: center;
      transition: all 0.15s;
    }
    .tab.ativo { border-color: #a855f7; background: #f3e8ff; color: #7c3aed; }

    .field { margin-bottom: 1.1rem; }
    .field label {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.78rem; font-weight: 700; color: #6b7280;
      letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 0.4rem;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-blue { background: #3b82f6; }
    .dot-pink { background: #ec4899; }
    .dot-purple { background: #a855f7; }
    .dot-green { background: #10b981; }
    .dot-orange { background: #f59e0b; }

    .field select, .field input {
      width: 100%; border: 1.5px solid #e5e7eb; border-radius: 12px;
      padding: 0.65rem 1rem; font-family: 'Nunito', sans-serif;
      font-size: 1rem; color: #1f2937; background: #f9fafb; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field select:focus, .field input:focus {
      border-color: #a855f7; box-shadow: 0 0 0 3px rgba(168,85,247,.15); background: #fff;
    }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn-enviar {
      width: 100%; padding: 0.9rem; border: none; border-radius: 14px;
      font-family: 'Nunito', sans-serif; font-size: 1.05rem; font-weight: 800;
      cursor: pointer; color: #fff; margin-top: 0.25rem;
      background: linear-gradient(135deg, #3b82f6 0%, #a855f7 50%, #ec4899 100%);
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-enviar:hover { opacity: 0.9; transform: scale(1.01); }
    .btn-enviar:active { transform: scale(0.98); }
    .btn-enviar:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .msg {
      margin-top: 0.85rem; padding: 0.7rem 1rem; border-radius: 10px;
      font-size: 0.92rem; font-weight: 600; text-align: center; display: none;
    }
    .msg.success { background: #d1fae5; color: #065f46; display: block; }
    .msg.error   { background: #fee2e2; color: #991b1b; display: block; }

    /* Resumo */
    .resumo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
    .resumo-box {
      border-radius: 14px; padding: 1rem; text-align: center;
    }
    .resumo-box.azul { background: #eff6ff; }
    .resumo-box.rosa { background: #fdf2f8; }
    .resumo-box .nome { font-size: 0.78rem; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .resumo-box .valor { font-size: 1.4rem; font-weight: 800; }
    .resumo-box.azul .valor { color: #2563eb; }
    .resumo-box.rosa .valor { color: #db2777; }

    .saldo-box {
      border-radius: 14px; padding: 1rem 1.25rem;
      background: linear-gradient(135deg, #f3e8ff, #fce7f3);
      margin-bottom: 1.25rem; text-align: center;
    }
    .saldo-box .label { font-size: 0.8rem; font-weight: 700; color: #7c3aed; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .saldo-box .valor { font-size: 1.5rem; font-weight: 800; color: #1f2937; }

    .btn-whats {
      width: 100%; padding: 0.8rem; border: none; border-radius: 14px;
      font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800;
      cursor: pointer; background: #25d366; color: #fff; margin-bottom: 1.25rem;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-whats:hover { opacity: 0.9; transform: scale(1.01); }

    /* Lista */
    .lista-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;
    }
    .lista-titulo { font-size: 1rem; font-weight: 800; color: #1f2937; }
    .badge {
      background: linear-gradient(135deg, #3b82f6, #ec4899);
      color: #fff; font-size: 0.72rem; font-weight: 800;
      padding: 0.2rem 0.65rem; border-radius: 99px;
    }

    .item {
      padding: 0.85rem 0; border-bottom: 1px solid #f3f4f6;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
    }
    .item:last-child { border-bottom: none; }
    .item-info { flex: 1; }
    .item-nome { font-size: 0.97rem; font-weight: 700; color: #1f2937; }
    .item-detalhe { font-size: 0.8rem; color: #6b7280; margin-top: 2px; }
    .item-valor { font-size: 1rem; font-weight: 800; color: #1f2937; white-space: nowrap; }
    .item-resp {
      font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 99px; margin-top: 3px; display: inline-block;
    }
    .resp-adriana { background: #fce7f3; color: #db2777; }
    .resp-washington { background: #eff6ff; color: #2563eb; }
    .resp-ambos { background: #f3e8ff; color: #7c3aed; }

    .tipo-tag {
      font-size: 0.68rem; font-weight: 700; padding: 2px 7px; border-radius: 99px; margin-left: 6px;
    }
    .tipo-fixa { background: #d1fae5; color: #065f46; }
    .tipo-parcela { background: #fef3c7; color: #92400e; }
    .tipo-extra { background: #ede9fe; color: #5b21b6; }

    .lista-vazia { text-align: center; color: #9ca3af; font-size: 0.95rem; padding: 1.5rem 0; }

    .footer { text-align: center; margin-top: 1.5rem; font-size: 0.82rem; color: #9ca3af; }
    .footer span { color: #ec4899; }

    .secao-oculta { display: none; }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <span class="emoji">💰</span>
    <h1>Despesas da Casa</h1>
    <p id="mes-atual"></p>
  </div>

  <!-- Formulário -->
  <div class="card">
    <div class="card-title">➕ Lançar despesa</div>

    <div class="tabs">
      <div class="tab ativo" onclick="trocarTipo('fixa')">📌 Fixa</div>
      <div class="tab" onclick="trocarTipo('parcela')">🔄 Parcela</div>
      <div class="tab" onclick="trocarTipo('extra')">⚡ Extra</div>
    </div>

    <!-- Fixa -->
    <div id="form-fixa">
      <div class="field">
        <label><span class="dot dot-blue"></span>Despesa</label>
        <select id="fixa-nome">
          <option value="">Selecione…</option>
          <option value="Aluguel|Washington">Aluguel (Washington)</option>
          <option value="Garagem|Washington">Garagem (Washington)</option>
          <option value="Sky|Adriana">Sky (Adriana)</option>
          <option value="Netflix|Adriana">Netflix (Adriana)</option>
          <option value="Luz|Washington">Luz (Washington)</option>
          <option value="Condomínio|Washington">Condomínio (Washington)</option>
          <option value="Clube|Washington">Clube (Washington)</option>
          <option value="Casa Muriaé|Washington">Casa Muriaé (Washington)</option>
          <option value="Casa Ctz|Adriana">Casa Ctz (Adriana)</option>
          <option value="Café|Washington">Café (Washington)</option>
          <option value="Liquidiz|Washington">Liquidiz (Washington)</option>
          <option value="Disney/Prime|Adriana">Disney/Prime (Adriana)</option>
        </select>
      </div>
      <div class="field">
        <label><span class="dot dot-pink"></span>Valor (R$)</label>
        <input type="number" id="fixa-valor" placeholder="0,00" step="0.01" />
      </div>
    </div>

    <!-- Parcela -->
    <div id="form-parcela" style="display:none">
      <div class="field">
        <label><span class="dot dot-orange"></span>Compra parcelada</label>
        <select id="parcela-nome">
          <option value="">Selecione…</option>
          <option value="Pernambucanas|Adriana">Pernambucanas (Adriana)</option>
          <option value="Outra|Adriana">Outra — Adriana</option>
          <option value="Outra|Washington">Outra — Washington</option>
        </select>
      </div>
      <div class="row2">
        <div class="field">
          <label><span class="dot dot-pink"></span>Valor parcela (R$)</label>
          <input type="number" id="parcela-valor" placeholder="0,00" step="0.01" />
        </div>
        <div class="field">
          <label><span class="dot dot-purple"></span>Parcela nº</label>
          <input type="text" id="parcela-num" placeholder="Ex: 3/10" />
        </div>
      </div>
      <div class="field" id="campo-parcela-desc" style="display:none">
        <label><span class="dot dot-blue"></span>Descrição</label>
        <input type="text" id="parcela-desc" placeholder="Nome da compra…" />
      </div>
    </div>

    <!-- Extra -->
    <div id="form-extra" style="display:none">
      <div class="field">
        <label><span class="dot dot-purple"></span>Descrição</label>
        <input type="text" id="extra-desc" placeholder="Ex: Presente, Remédio, Viagem…" />
      </div>
      <div class="row2">
        <div class="field">
          <label><span class="dot dot-pink"></span>Valor (R$)</label>
          <input type="number" id="extra-valor" placeholder="0,00" step="0.01" />
        </div>
        <div class="field">
          <label><span class="dot dot-blue"></span>Quem pagou</label>
          <select id="extra-resp">
            <option value="Adriana">Adriana</option>
            <option value="Washington">Washington</option>
            <option value="Ambos">Ambos</option>
          </select>
        </div>
      </div>
    </div>

    <button class="btn-enviar" id="btn-enviar" onclick="enviar()">✨ Lançar despesa</button>
    <div class="msg" id="msg"></div>
  </div>

  <!-- Resumo -->
  <div class="card">
    <div class="card-title">📊 Resumo do mês</div>
    <div class="resumo-grid">
      <div class="resumo-box rosa">
        <div class="nome">Adriana pagou</div>
        <div class="valor" id="total-adriana">R$ 0,00</div>
      </div>
      <div class="resumo-box azul">
        <div class="nome">Washington pagou</div>
        <div class="valor" id="total-washington">R$ 0,00</div>
      </div>
    </div>
    <div class="saldo-box">
      <div class="label">Acerto do mês</div>
      <div class="valor" id="saldo-texto">Sem lançamentos ainda</div>
    </div>
    <button class="btn-whats" onclick="enviarWhatsApp()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.136.563 4.14 1.534 5.876L0 24l6.335-1.652A11.955 11.955 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.882a9.875 9.875 0 01-5.031-1.378l-.361-.214-3.741.976.999-3.648-.235-.374A9.861 9.861 0 012.118 12C2.118 6.533 6.533 2.118 12 2.118S21.882 6.533 21.882 12 17.467 21.882 12 21.882z"/></svg>
      Enviar resumo pelo WhatsApp
    </button>
  </div>

  <!-- Lista -->
  <div class="card">
    <div class="lista-header">
      <span class="lista-titulo">📋 Lançamentos do mês</span>
      <span class="badge" id="badge-count">0</span>
    </div>
    <div id="lista-itens">
      <div class="lista-vazia">Nenhuma despesa lançada ainda 💸</div>
    </div>
  </div>

  <p class="footer">Feito com <span>♥</span> para vocês dois</p>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyeSFJPqmBBWJ5TdBqMHddjfsMUXsBryeHlXbSrZ5m3G3s5URNBKxPRePxw1A3wmVEbaw/exec";

  const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const agora = new Date();
  const mesAtual = MESES[agora.getMonth()] + " " + agora.getFullYear();
  document.getElementById("mes-atual").textContent = mesAtual;

  let tipoAtivo = "fixa";
  let despesas = JSON.parse(localStorage.getItem("despesas-" + mesAtual) || "[]");

  function trocarTipo(tipo) {
    tipoAtivo = tipo;
    document.querySelectorAll(".tab").forEach((t, i) => {
      t.classList.toggle("ativo", ["fixa","parcela","extra"][i] === tipo);
    });
    document.getElementById("form-fixa").style.display = tipo === "fixa" ? "block" : "none";
    document.getElementById("form-parcela").style.display = tipo === "parcela" ? "block" : "none";
    document.getElementById("form-extra").style.display = tipo === "extra" ? "block" : "none";
  }

  document.getElementById("parcela-nome").addEventListener("change", function() {
    document.getElementById("campo-parcela-desc").style.display =
      this.value.startsWith("Outra") ? "" : "none";
  });

  function salvar() {
    localStorage.setItem("despesas-" + mesAtual, JSON.stringify(despesas));
  }

  function fmt(v) {
    return "R$ " + Number(v).toLocaleString("pt-BR", {minimumFractionDigits:2, maximumFractionDigits:2});
  }

  function calcularResumo() {
    let adriana = 0, washington = 0;
    despesas.forEach(d => {
      const v = parseFloat(d.valor) || 0;
      if (d.responsavel === "Adriana") adriana += v;
      else if (d.responsavel === "Washington") washington += v;
      else { adriana += v/2; washington += v/2; }
    });
    const total = adriana + washington;
    const metade = total / 2;
    const diff = adriana - metade;

    document.getElementById("total-adriana").textContent = fmt(adriana);
    document.getElementById("total-washington").textContent = fmt(washington);

    let saldo = "";
    if (despesas.length === 0) {
      saldo = "Sem lançamentos ainda";
    } else if (Math.abs(diff) < 0.01) {
      saldo = "✅ Estão quites!";
    } else if (diff > 0) {
      saldo = "Washington deve " + fmt(diff) + " para Adriana";
    } else {
      saldo = "Adriana deve " + fmt(Math.abs(diff)) + " para Washington";
    }
    document.getElementById("saldo-texto").textContent = saldo;
  }

  function renderizar() {
    const container = document.getElementById("lista-itens");
    document.getElementById("badge-count").textContent = despesas.length;
    calcularResumo();

    if (despesas.length === 0) {
      container.innerHTML = '<div class="lista-vazia">Nenhuma despesa lançada ainda 💸</div>';
      return;
    }

    container.innerHTML = [...despesas].reverse().map(d => {
      const respClass = d.responsavel === "Adriana" ? "resp-adriana" : d.responsavel === "Washington" ? "resp-washington" : "resp-ambos";
      const tipoClass = d.tipo === "fixa" ? "tipo-fixa" : d.tipo === "parcela" ? "tipo-parcela" : "tipo-extra";
      const tipoLabel = d.tipo === "fixa" ? "Fixa" : d.tipo === "parcela" ? "Parcela" : "Extra";
      const detalhe = d.parcela ? "Parcela " + d.parcela : d.data;
      return `
        <div class="item">
          <div class="item-info">
            <div class="item-nome">${d.nome}<span class="tipo-tag ${tipoClass}">${tipoLabel}</span></div>
            <div class="item-detalhe">${detalhe}</div>
            <span class="item-resp ${respClass}">${d.responsavel}</span>
          </div>
          <div class="item-valor">${fmt(d.valor)}</div>
        </div>`;
    }).join("");
  }

  function enviarWhatsApp() {
    if (despesas.length === 0) { alert("Nenhuma despesa lançada ainda!"); return; }
    let adriana = 0, washington = 0;
    despesas.forEach(d => {
      const v = parseFloat(d.valor) || 0;
      if (d.responsavel === "Adriana") adriana += v;
      else if (d.responsavel === "Washington") washington += v;
      else { adriana += v/2; washington += v/2; }
    });
    const total = adriana + washington;
    const diff = adriana - total/2;

    let texto = "💰 *Despesas da Casa — " + mesAtual + "*\n\n";
    texto += "👩 Adriana pagou: " + fmt(adriana) + "\n";
    texto += "👨 Washington pagou: " + fmt(washington) + "\n";
    texto += "📦 Total do mês: " + fmt(total) + "\n\n";

    if (Math.abs(diff) < 0.01) {
      texto += "✅ Estão quites!";
    } else if (diff > 0) {
      texto += "➡️ Washington deve pagar " + fmt(diff) + " para Adriana";
    } else {
      texto += "➡️ Adriana deve pagar " + fmt(Math.abs(diff)) + " para Washington";
    }

    window.open("https://wa.me/?text=" + encodeURIComponent(texto), "_blank");
  }

  async function enviar() {
    const btn = document.getElementById("btn-enviar");
    const msg = document.getElementById("msg");
    let nome, valor, responsavel, parcela = "", tipo = tipoAtivo;

    if (tipoAtivo === "fixa") {
      const sel = document.getElementById("fixa-nome").value;
      if (!sel) { mostrarMsg("Selecione a despesa.", "error"); return; }
      const [n, r] = sel.split("|");
      nome = n; responsavel = r;
      valor = document.getElementById("fixa-valor").value;
      if (!valor) { mostrarMsg("Informe o valor.", "error"); return; }

    } else if (tipoAtivo === "parcela") {
      const sel = document.getElementById("parcela-nome").value;
      if (!sel) { mostrarMsg("Selecione a parcela.", "error"); return; }
      const [n, r] = sel.split("|");
      responsavel = r;
      nome = sel.startsWith("Outra") ? (document.getElementById("parcela-desc").value || "Parcela") : n;
      valor = document.getElementById("parcela-valor").value;
      parcela = document.getElementById("parcela-num").value;
      if (!valor) { mostrarMsg("Informe o valor da parcela.", "error"); return; }

    } else {
      nome = document.getElementById("extra-desc").value.trim();
      valor = document.getElementById("extra-valor").value;
      responsavel = document.getElementById("extra-resp").value;
      if (!nome) { mostrarMsg("Informe a descrição.", "error"); return; }
      if (!valor) { mostrarMsg("Informe o valor.", "error"); return; }
    }

    btn.disabled = true; btn.textContent = "Enviando…";
    msg.className = "msg"; msg.style.display = "none";

    const data = new Date().toLocaleDateString("pt-BR");
    const registro = { nome, valor: parseFloat(valor), responsavel, parcela, tipo, data, mes: mesAtual };

    try {
      await fetch(SCRIPT_URL, {
        method: "POST", mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(registro)
      });

      despesas.push(registro);
      salvar(); renderizar();
      mostrarMsg("✅ Despesa lançada com sucesso!", "success");

      document.getElementById("fixa-nome").value = "";
      document.getElementById("fixa-valor").value = "";
      document.getElementById("parcela-nome").value = "";
      document.getElementById("parcela-valor").value = "";
      document.getElementById("parcela-num").value = "";
      document.getElementById("parcela-desc").value = "";
      document.getElementById("extra-desc").value = "";
      document.getElementById("extra-valor").value = "";

    } catch(e) {
      mostrarMsg("Erro ao enviar. Verifique sua conexão.", "error");
    } finally {
      btn.disabled = false; btn.textContent = "✨ Lançar despesa";
    }
  }

  function mostrarMsg(texto, tipo) {
    const msg = document.getElementById("msg");
    msg.textContent = texto; msg.className = "msg " + tipo;
  }

  renderizar();
</script>
</body>
</html>
