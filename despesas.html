<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Despesas da Casa 💰</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #e0eaff 0%, #fce4f3 100%);
      padding: 2rem 1rem 4rem;
    }
    .container { width: 100%; max-width: 520px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 2rem; }
    .header .emoji { font-size: 3rem; display: block; margin-bottom: 0.5rem; }
    .header h1 {
      font-size: 1.9rem; font-weight: 800;
      background: linear-gradient(90deg, #3b82f6, #a855f7, #ec4899);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 0.3rem;
    }
    .header p { font-size: 0.95rem; color: #6b7280; }
    .card {
      background: #fff; border-radius: 24px; padding: 1.75rem;
      box-shadow: 0 8px 32px rgba(59,130,246,.10), 0 2px 8px rgba(236,72,153,.08);
      margin-bottom: 1.5rem;
    }
    .card-title { font-size: 1rem; font-weight: 800; color: #1f2937; margin-bottom: 1.25rem; }
    .btn-foto {
      width: 100%; padding: 0.85rem; border: 2px dashed #a855f7;
      border-radius: 14px; font-family: 'Nunito', sans-serif;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
      background: #f9f5ff; color: #7c3aed; text-align: center;
      margin-bottom: 1.25rem; transition: all 0.15s; display: flex;
      align-items: center; justify-content: center; gap: 8px;
    }
    .btn-foto:hover { background: #f3e8ff; border-color: #7c3aed; }
    .preview-foto { width: 100%; border-radius: 12px; margin-bottom: 1rem; display: none; max-height: 200px; object-fit: cover; }
    .lendo-ia { text-align: center; padding: 1rem; background: #f3e8ff; border-radius: 12px; margin-bottom: 1rem; display: none; color: #7c3aed; font-weight: 700; font-size: 0.95rem; }
    .tabs { display: flex; gap: 8px; margin-bottom: 1.25rem; }
    .tab {
      flex: 1; padding: 0.6rem 0.4rem; border: 2px solid #e5e7eb;
      border-radius: 12px; font-family: 'Nunito', sans-serif;
      font-size: 0.8rem; font-weight: 700; cursor: pointer;
      background: #f9fafb; color: #6b7280; text-align: center; transition: all 0.15s;
    }
    .tab.ativo { border-color: #a855f7; background: #f3e8ff; color: #7c3aed; }
    .field { margin-bottom: 1.1rem; }
    .field label {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.78rem; font-weight: 700; color: #6b7280;
      letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 0.4rem;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-blue { background: #3b82f6; }
    .dot-pink { background: #ec4899; }
    .dot-purple { background: #a855f7; }
    .dot-orange { background: #f59e0b; }
    .field select, .field input {
      width: 100%; border: 1.5px solid #e5e7eb; border-radius: 12px;
      padding: 0.65rem 1rem; font-family: 'Nunito', sans-serif;
      font-size: 1rem; color: #1f2937; background: #f9fafb; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field select:focus, .field input:focus {
      border-color: #a855f7; box-shadow: 0 0 0 3px rgba(168,85,247,.15); background: #fff;
    }
    .field input.preenchido { border-color: #10b981; background: #f0fdf4; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn-enviar {
      width: 100%; padding: 0.9rem; border: none; border-radius: 14px;
      font-family: 'Nunito', sans-serif; font-size: 1.05rem; font-weight: 800;
      cursor: pointer; color: #fff; margin-top: 0.25rem;
      background: linear-gradient(135deg, #3b82f6 0%, #a855f7 50%, #ec4899 100%);
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-enviar:hover { opacity: 0.9; transform: scale(1.01); }
    .btn-enviar:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { margin-top: 0.85rem; padding: 0.7rem 1rem; border-radius: 10px; font-size: 0.92rem; font-weight: 600; text-align: center; display: none; }
    .msg.success { background: #d1fae5; color: #065f46; display: block; }
    .msg.error   { background: #fee2e2; color: #991b1b; display: block; }
    .resumo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
    .resumo-box { border-radius: 14px; padding: 1rem; text-align: center; }
    .resumo-box.azul { background: #eff6ff; }
    .resumo-box.rosa { background: #fdf2f8; }
    .resumo-box .nome { font-size: 0.78rem; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .resumo-box .valor { font-size: 1.4rem; font-weight: 800; }
    .resumo-box.azul .valor { color: #2563eb; }
    .resumo-box.rosa .valor { color: #db2777; }
    .saldo-box { border-radius: 14px; padding: 1rem 1.25rem; background: linear-gradient(135deg, #f3e8ff, #fce7f3); margin-bottom: 1.25rem; text-align: center; }
    .saldo-box .label { font-size: 0.8rem; font-weight: 700; color: #7c3aed; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .saldo-box .valor { font-size: 1.3rem; font-weight: 800; color: #1f2937; }
    .btn-whats {
      width: 100%; padding: 0.8rem; border: none; border-radius: 14px;
      font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800;
      cursor: pointer; background: #25d366; color: #fff; margin-bottom: 1.25rem;
      display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.15s;
    }
    .btn-whats:hover { opacity: 0.9; }
    .lista-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .lista-titulo { font-size: 1rem; font-weight: 800; color: #1f2937; }
    .badge { background: linear-gradient(135deg, #3b82f6, #ec4899); color: #fff; font-size: 0.72rem; font-weight: 800; padding: 0.2rem 0.65rem; border-radius: 99px; }
    .item { padding: 0.85rem 0; border-bottom: 1px solid #f3f4f6; display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .item:last-child { border-bottom: none; }
    .item-info { flex: 1; }
    .item-nome { font-size: 0.97rem; font-weight: 700; color: #1f2937; }
    .item-detalhe { font-size: 0.8rem; color: #6b7280; margin-top: 2px; }
    .item-direita { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .item-valor { font-size: 1rem; font-weight: 800; color: #1f2937; white-space: nowrap; }
    .btn-excluir { border: none; background: #fee2e2; color: #991b1b; font-family: 'Nunito', sans-serif; font-size: 0.72rem; font-weight: 700; padding: 3px 10px; border-radius: 99px; cursor: pointer; white-space: nowrap; }
    .btn-excluir:hover { background: #fecaca; }
    .item-resp { font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 99px; margin-top: 3px; display: inline-block; }
    .resp-adriana { background: #fce7f3; color: #db2777; }
    .resp-washington { background: #eff6ff; color: #2563eb; }
    .resp-ambos { background: #f3e8ff; color: #7c3aed; }
    .tipo-tag { font-size: 0.68rem; font-weight: 700; padding: 2px 7px; border-radius: 99px; margin-left: 6px; }
    .tipo-fixa { background: #d1fae5; color: #065f46; }
    .tipo-parcela { background: #fef3c7; color: #92400e; }
    .tipo-extra { background: #ede9fe; color: #5b21b6; }
    .lista-vazia { text-align: center; color: #9ca3af; font-size: 0.95rem; padding: 1.5rem 0; }
    .footer { text-align: center; margin-top: 1.5rem; font-size: 0.82rem; color: #9ca3af; }
    .footer span { color: #ec4899; }
    #input-foto { display: none; }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <span class="emoji">💰</span>
    <h1>Despesas da Casa</h1>
    <p id="mes-atual"></p>
  </div>

  <div class="card">
    <div class="card-title">➕ Lançar despesa</div>
    <label class="btn-foto" for="input-foto">📸 Ler nota fiscal ou fatura</label>
    <input type="file" id="input-foto" accept="image/*" capture="environment" onchange="lerNota(event)" />
    <img id="preview-foto" class="preview-foto" />
    <div class="lendo-ia" id="lendo-ia">🤖 Analisando a imagem com IA… aguarde</div>

    <div class="tabs">
      <div class="tab ativo" id="tab-fixa" onclick="trocarTipo('fixa')">📌 Fixa</div>
      <div class="tab" id="tab-parcela" onclick="trocarTipo('parcela')">🔄 Parcela</div>
      <div class="tab" id="tab-extra" onclick="trocarTipo('extra')">⚡ Extra</div>
    </div>

    <div id="form-fixa">
      <div class="field">
        <label><span class="dot dot-blue"></span>Despesa</label>
        <select id="fixa-nome">
          <option value="">Selecione…</option>
          <option value="Aluguel|Washington">Aluguel (Washington)</option>
          <option value="Garagem|Washington">Garagem (Washington)</option>
          <option value="Sky|Adriana">Sky (Adriana)</option>
          <option value="Netflix|Adriana">Netflix (Adriana)</option>
          <option value="Luz|Washington">Luz (Washington)</option>
          <option value="Condomínio|Washington">Condomínio (Washington)</option>
          <option value="Clube|Washington">Clube (Washington)</option>
          <option value="Casa Muriaé|Washington">Casa Muriaé (Washington)</option>
          <option value="Casa Ctz|Adriana">Casa Ctz (Adriana)</option>
          <option value="Café|Washington">Café (Washington)</option>
          <option value="Liquidiz|Washington">Liquidiz (Washington)</option>
          <option value="Disney/Prime|Adriana">Disney/Prime (Adriana)</option>
        </select>
      </div>
      <div class="field">
        <label><span class="dot dot-pink"></span>Valor (R$)</label>
        <input type="number" id="fixa-valor" placeholder="0,00" step="0.01" />
      </div>
    </div>

    <div id="form-parcela" style="display:none">
      <div class="field">
        <label><span class="dot dot-orange"></span>Compra parcelada</label>
        <select id="parcela-nome" onchange="verificarOutraParcela()">
          <option value="">Selecione…</option>
          <option value="Pernambucanas|Adriana">Pernambucanas (Adriana)</option>
          <option value="Outra|Adriana">Outra — Adriana</option>
          <option value="Outra|Washington">Outra — Washington</option>
        </select>
      </div>
      <div id="campo-parcela-desc" style="display:none">
        <div class="field">
          <label><span class="dot dot-blue"></span>Descrição</label>
          <input type="text" id="parcela-desc" placeholder="Nome da compra…" />
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label><span class="dot dot-pink"></span>Valor (R$)</label>
          <input type="number" id="parcela-valor" placeholder="0,00" step="0.01" />
        </div>
        <div class="field">
          <label><span class="dot dot-purple"></span>Parcela nº</label>
          <input type="text" id="parcela-num" placeholder="Ex: 3/10" />
        </div>
      </div>
    </div>

    <div id="form-extra" style="display:none">
      <div class="field">
        <label><span class="dot dot-purple"></span>Descrição</label>
        <input type="text" id="extra-desc" placeholder="Ex: Presente, Remédio, Viagem…" />
      </div>
      <div class="row2">
        <div class="field">
          <label><span class="dot dot-pink"></span>Valor (R$)</label>
          <input type="number" id="extra-valor" placeholder="0,00" step="0.01" />
        </div>
        <div class="field">
          <label><span class="dot dot-blue"></span>Quem pagou</label>
          <select id="extra-resp">
            <option value="Adriana">Adriana</option>
            <option value="Washington">Washington</option>
            <option value="Ambos">Ambos</option>
          </select>
        </div>
      </div>
    </div>

    <button class="btn-enviar" id="btn-enviar" onclick="enviar()">✨ Lançar despesa</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="card">
    <div class="card-title">📊 Resumo do mês</div>
    <div class="resumo-grid">
      <div class="resumo-box rosa">
        <div class="nome">Adriana pagou</div>
        <div class="valor" id="total-adriana">R$ 0,00</div>
      </div>
      <div class="resumo-box azul">
        <div class="nome">Washington pagou</div>
        <div class="valor" id="total-washington">R$ 0,00</div>
      </div>
    </div>
    <div class="saldo-box">
      <div class="label">Acerto do mês</div>
      <div class="valor" id="saldo-texto">Sem lançamentos ainda</div>
    </div>
    <button class="btn-whats" onclick="enviarWhatsApp()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.136.563 4.14 1.534 5.876L0 24l6.335-1.652A11.955 11.955 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.882a9.875 9.875 0 01-5.031-1.378l-.361-.214-3.741.976.999-3.648-.235-.374A9.861 9.861 0 012.118 12C2.118 6.533 6.533 2.118 12 2.118S21.882 6.533 21.882 12 17.467 21.882 12 21.882z"/></svg>
      Enviar resumo pelo WhatsApp
    </button>
  </div>

  <div class="card">
    <div class="lista-header">
      <span class="lista-titulo">📋 Lançamentos do mês</span>
      <span class="badge" id="badge-count">0</span>
    </div>
    <div id="lista-itens">
      <div class="lista-vazia">Nenhuma despesa lançada ainda 💸</div>
    </div>
  </div>

  <p class="footer">Feito com <span>♥</span> para vocês dois</p>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyeSFJPqmBBWJ5TdBqMHddjfsMUXsBryeHlXbSrZ5m3G3s5URNBKxPRePxw1A3wmVEbaw/exec";
  const API_KEY = "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";

  const FORNECEDORES = {
    "sky": { tipo: "fixa", valor: "Sky|Adriana" },
    "netflix": { tipo: "fixa", valor: "Netflix|Adriana" },
    "energisa": { tipo: "fixa", valor: "Luz|Washington" },
    "cemig": { tipo: "fixa", valor: "Luz|Washington" },
    "light": { tipo: "fixa", valor: "Luz|Washington" },
    "condominio": { tipo: "fixa", valor: "Condomínio|Washington" },
    "pernambucanas": { tipo: "parcela", valor: "Pernambucanas|Adriana" },
    "disney": { tipo: "fixa", valor: "Disney/Prime|Adriana" },
    "prime": { tipo: "fixa", valor: "Disney/Prime|Adriana" },
    "clube": { tipo: "fixa", valor: "Clube|Washington" },
    "liquidiz": { tipo: "fixa", valor: "Liquidiz|Washington" },
    "nespresso": { tipo: "extra", valor: "Nespresso|Ambos" },
    "giga": { tipo: "fixa", valor: "Giga Fibra|Washington" }
  };

  const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const agora = new Date();
  const mesAtual = MESES[agora.getMonth()] + " " + agora.getFullYear();
  document.getElementById("mes-atual").textContent = mesAtual;

  let tipoAtivo = "fixa";
  let despesas = JSON.parse(localStorage.getItem("despesas-" + mesAtual) || "[]");

  function trocarTipo(tipo) {
    tipoAtivo = tipo;
    document.getElementById("tab-fixa").className    = "tab" + (tipo === "fixa"    ? " ativo" : "");
    document.getElementById("tab-parcela").className = "tab" + (tipo === "parcela" ? " ativo" : "");
    document.getElementById("tab-extra").className   = "tab" + (tipo === "extra"   ? " ativo" : "");
    document.getElementById("form-fixa").style.display    = tipo === "fixa"    ? "block" : "none";
    document.getElementById("form-parcela").style.display = tipo === "parcela" ? "block" : "none";
    document.getElementById("form-extra").style.display   = tipo === "extra"   ? "block" : "none";
  }

  function verificarOutraParcela() {
    const val = document.getElementById("parcela-nome").value;
    document.getElementById("campo-parcela-desc").style.display = val.startsWith("Outra") ? "block" : "none";
  }

  async function lerNota(event) {
    const file = event.target.files[0];
    if (!file) return;
    const preview = document.getElementById("preview-foto");
    const lendo = document.getElementById("lendo-ia");
    const reader = new FileReader();
    reader.onload = async function(e) {
      preview.src = e.target.result;
      preview.style.display = "block";
      lendo.style.display = "block";
      const base64 = e.target.result.split(",")[1];
      const mediaType = file.type;
      try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": API_KEY,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true"
          },
          body: JSON.stringify({
            model: "claude-sonnet-4-6",
            max_tokens: 500,
            messages: [{
              role: "user",
              content: [
                { type: "image", source: { type: "base64", media_type: mediaType, data: base64 } },
                { type: "text", text: 'Analise esta nota fiscal ou fatura e extraia as informações. Responda APENAS em JSON, sem texto adicional, no formato:\n{\n  "fornecedor": "nome do fornecedor ou estabelecimento",\n  "valor": 0.00,\n  "data": "dd/mm/aaaa ou vazio se não encontrar"\n}\nO valor deve ser número sem R$ ou vírgula (use ponto decimal).' }
              ]
            }]
          })
        });
        const data = await response.json();
        const texto = data.content[0].text.replace(/```json|```/g, "").trim();
        const resultado = JSON.parse(texto);
        lendo.style.display = "none";
        preencherCampos(resultado);
      } catch(err) {
        lendo.textContent = "Não foi possível ler a imagem. Preencha manualmente.";
        lendo.style.background = "#fee2e2";
        lendo.style.color = "#991b1b";
      }
    };
    reader.readAsDataURL(file);
  }

  function preencherCampos(resultado) {
    const fornecedor = (resultado.fornecedor || "").toLowerCase();
    const valor = resultado.valor;
    let tipoEncontrado = null;
    let chaveEncontrada = null;
    for (const [chave, config] of Object.entries(FORNECEDORES)) {
      if (fornecedor.includes(chave)) {
        tipoEncontrado = config.tipo;
        chaveEncontrada = config.valor;
        break;
      }
    }
    if (tipoEncontrado === "fixa") {
      trocarTipo("fixa");
      document.getElementById("fixa-nome").value = chaveEncontrada;
      if (valor) { const i = document.getElementById("fixa-valor"); i.value = valor; i.classList.add("preenchido"); }
    } else if (tipoEncontrado === "parcela") {
      trocarTipo("parcela");
      document.getElementById("parcela-nome").value = chaveEncontrada;
      if (valor) { const i = document.getElementById("parcela-valor"); i.value = valor; i.classList.add("preenchido"); }
    } else {
      trocarTipo("extra");
      const d = document.getElementById("extra-desc"); d.value = resultado.fornecedor || ""; d.classList.add("preenchido");
      if (valor) { const i = document.getElementById("extra-valor"); i.value = valor; i.classList.add("preenchido"); }
    }
    mostrarMsg("✅ IA preencheu os campos! Confirme e lance.", "success");
  }

  function salvar() {
    localStorage.setItem("despesas-" + mesAtual, JSON.stringify(despesas));
  }

  function fmt(v) {
    return "R$ " + Number(v).toLocaleString("pt-BR", {minimumFractionDigits:2, maximumFractionDigits:2});
  }

  function calcularResumo() {
    let adriana = 0, washington = 0;
    despesas.forEach(function(d) {
      const v = parseFloat(d.valor) || 0;
      if (d.responsavel === "Adriana") adriana += v;
      else if (d.responsavel === "Washington") washington += v;
      else { adriana += v/2; washington += v/2; }
    });
    const total = adriana + washington;
    const diff = adriana - total/2;
    document.getElementById("total-adriana").textContent = fmt(adriana);
    document.getElementById("total-washington").textContent = fmt(washington);
    var saldo = "";
    if (despesas.length === 0) saldo = "Sem lançamentos ainda";
    else if (Math.abs(diff) < 0.01) saldo = "✅ Estão quites!";
    else if (diff > 0) saldo = "Washington deve " + fmt(diff) + " para Adriana";
    else saldo = "Adriana deve " + fmt(Math.abs(diff)) + " para Washington";
    document.getElementById("saldo-texto").textContent = saldo;
  }

  function excluir(idx) {
    var item = despesas[idx];
    if (!item) return;
    if (!confirm('Excluir "' + item.nome + '"?')) return;
    fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        acao: "excluir",
        nome: item.nome,
        valor: item.valor,
        responsavel: item.responsavel,
        mes: item.mes
      })
    }).catch(function() {});
    despesas.splice(idx, 1);
    salvar();
    mostrarMsg("🗑️ Despesa excluída!", "success");
    renderizar();
  }

  function renderizar() {
    const container = document.getElementById("lista-itens");
    document.getElementById("badge-count").textContent = despesas.length;
    calcularResumo();
    if (despesas.length === 0) {
      container.innerHTML = '<div class="lista-vazia">Nenhuma despesa lançada ainda 💸</div>';
      return;
    }
    // Criar cópia ordenada com índice original
    var lista = [];
    for (var i = 0; i < despesas.length; i++) {
      lista.push({ d: despesas[i], idx: i });
    }
    lista.reverse();

    var html = "";
    for (var j = 0; j < lista.length; j++) {
      var d = lista[j].d;
      var idx = lista[j].idx;
      var respClass = d.responsavel === "Adriana" ? "resp-adriana" : d.responsavel === "Washington" ? "resp-washington" : "resp-ambos";
      var tipoClass = d.tipo === "fixa" ? "tipo-fixa" : d.tipo === "parcela" ? "tipo-parcela" : "tipo-extra";
      var tipoLabel = d.tipo === "fixa" ? "Fixa" : d.tipo === "parcela" ? "Parcela" : "Extra";
      var detalhe = d.parcela ? "Parcela " + d.parcela : d.data;
      html += '<div class="item">';
      html += '<div class="item-info">';
      html += '<div class="item-nome">' + d.nome + '<span class="tipo-tag ' + tipoClass + '">' + tipoLabel + '</span></div>';
      html += '<div class="item-detalhe">' + detalhe + '</div>';
      html += '<span class="item-resp ' + respClass + '">' + d.responsavel + '</span>';
      html += '</div>';
      html += '<div class="item-direita">';
      html += '<div class="item-valor">' + fmt(d.valor) + '</div>';
      html += '<button class="btn-excluir" onclick="excluir(' + idx + ')">🗑️ Excluir</button>';
      html += '</div>';
      html += '</div>';
    }
    container.innerHTML = html;
  }

  function enviarWhatsApp() {
    if (despesas.length === 0) { alert("Nenhuma despesa lançada ainda!"); return; }
    var adriana = 0, washington = 0;
    despesas.forEach(function(d) {
      var v = parseFloat(d.valor) || 0;
      if (d.responsavel === "Adriana") adriana += v;
      else if (d.responsavel === "Washington") washington += v;
      else { adriana += v/2; washington += v/2; }
    });
    var total = adriana + washington;
    var diff = adriana - total/2;
    var texto = "💰 *Despesas da Casa — " + mesAtual + "*\n\n";
    texto += "👩 Adriana pagou: " + fmt(adriana) + "\n";
    texto += "👨 Washington pagou: " + fmt(washington) + "\n";
    texto += "📦 Total do mês: " + fmt(total) + "\n\n";
    if (Math.abs(diff) < 0.01) texto += "✅ Estão quites!";
    else if (diff > 0) texto += "➡️ Washington deve pagar " + fmt(diff) + " para Adriana";
    else texto += "➡️ Adriana deve pagar " + fmt(Math.abs(diff)) + " para Washington";
    window.open("https://wa.me/?text=" + encodeURIComponent(texto), "_blank");
  }

  async function enviar() {
    var btn = document.getElementById("btn-enviar");
    var msg = document.getElementById("msg");
    var nome, valor, responsavel, parcela = "", tipo = tipoAtivo;
    if (tipoAtivo === "fixa") {
      var sel = document.getElementById("fixa-nome").value;
      if (!sel) { mostrarMsg("Selecione a despesa.", "error"); return; }
      var partes = sel.split("|"); nome = partes[0]; responsavel = partes[1];
      valor = document.getElementById("fixa-valor").value;
      if (!valor) { mostrarMsg("Informe o valor.", "error"); return; }
    } else if (tipoAtivo === "parcela") {
      var sel2 = document.getElementById("parcela-nome").value;
      if (!sel2) { mostrarMsg("Selecione a parcela.", "error"); return; }
      var partes2 = sel2.split("|"); responsavel = partes2[1];
      nome = sel2.startsWith("Outra") ? (document.getElementById("parcela-desc").value || "Parcela") : partes2[0];
      valor = document.getElementById("parcela-valor").value;
      parcela = document.getElementById("parcela-num").value;
      if (!valor) { mostrarMsg("Informe o valor da parcela.", "error"); return; }
    } else {
      nome = document.getElementById("extra-desc").value.trim();
      valor = document.getElementById("extra-valor").value;
      responsavel = document.getElementById("extra-resp").value;
      if (!nome) { mostrarMsg("Informe a descrição.", "error"); return; }
      if (!valor) { mostrarMsg("Informe o valor.", "error"); return; }
    }
    btn.disabled = true; btn.textContent = "Enviando…";
    msg.className = "msg"; msg.style.display = "none";
    var data = new Date().toLocaleDateString("pt-BR");
    var registro = { nome: nome, valor: parseFloat(valor), responsavel: responsavel, parcela: parcela, tipo: tipo, data: data, mes: mesAtual };
    try {
      await fetch(SCRIPT_URL, {
        method: "POST", mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(registro)
      });
      despesas.push(registro);
      salvar(); renderizar();
      mostrarMsg("✅ Despesa lançada com sucesso!", "success");
      document.getElementById("fixa-nome").value = "";
      document.getElementById("fixa-valor").value = "";
      document.getElementById("parcela-nome").value = "";
      document.getElementById("parcela-valor").value = "";
      document.getElementById("parcela-num").value = "";
      document.getElementById("parcela-desc").value = "";
      document.getElementById("extra-desc").value = "";
      document.getElementById("extra-valor").value = "";
      document.getElementById("preview-foto").style.display = "none";
      document.getElementById("lendo-ia").style.display = "none";
      document.getElementById("input-foto").value = "";
      document.querySelectorAll(".preenchido").forEach(function(el) { el.classList.remove("preenchido"); });
    } catch(e) {
      mostrarMsg("Erro ao enviar. Verifique sua conexão.", "error");
    } finally {
      btn.disabled = false; btn.textContent = "✨ Lançar despesa";
    }
  }

  function mostrarMsg(texto, tipo) {
    var msg = document.getElementById("msg");
    msg.textContent = texto; msg.className = "msg " + tipo;
  }

  renderizar();
</script>
</body>
</html>
